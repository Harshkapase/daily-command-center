<script>
// ── Storage shim (localStorage for PWA) ──────────────────────────────────
window.storage = {
  get: async (key) => {
    try { const v = localStorage.getItem(key); return v !== null ? { key, value: v } : null; } catch(e) { return null; }
  },
  set: async (key, value) => {
    try { localStorage.setItem(key, value); return { key, value }; } catch(e) { return null; }
  },
  delete: async (key) => {
    try { localStorage.removeItem(key); return { key, deleted: true }; } catch(e) { return null; }
  },
  list: async (prefix) => {
    try {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys };
    } catch(e) { return { keys: [] }; }
  }
};

// ── Service Worker registration ───────────────────────────────────────────
let swReg = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    swReg = reg;
    console.log('SW registered:', reg.scope);
    // Kick off water interval in SW
    if (reg.active) reg.active.postMessage({ type: 'WATER_INTERVAL' });
    reg.addEventListener('updatefound', () => {
      reg.installing?.addEventListener('statechange', e => {
        if (e.target.state === 'activated') reg.active.postMessage({ type: 'WATER_INTERVAL' });
      });
    });
  }).catch(e => console.warn('SW reg failed:', e));
}

// Schedule a notification via SW (fires even with tab minimized on Android)
function scheduleNotif(id, delayMs, title, body) {
  if (swReg?.active) {
    swReg.active.postMessage({ type: 'SCHEDULE', id, delay: delayMs, title, body, tag: `hk-${id}` });
  }
}
window.scheduleNotif = scheduleNotif;
</script>

const actx = { c: null };

  water:(ctx)=>{ const t=ctx.currentTime; [0,.12].forEach(d=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type="sine";o.frequency.setValueAtTime(900,t+d);o.frequency.exponentialRampToValueAtTime(400,t+d+.15); g.gain.setValueAtTime(.22,t+d);g.gain.exponentialRampToValueAtTime(.001,t+d+.18); o.start(t+d);o.stop(t+d+.2); }); },

  food:(ctx)=>{ const t=ctx.currentTime; [523,659,784].forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type="sine";o.frequency.setValueAtTime(f,t+i*.12); g.gain.setValueAtTime(.2,t+i*.12);g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.4); o.start(t+i*.12);o.stop(t+i*.12+.45); }); },

};

  const [goals,setGoals]=useState(SUBJECTS.map((s,i)=>({id:i+1,s,topic:"",target:"",done:false})));
  const [streak,setStreak]=useState({n:0,last:""});

  const [mi,setMi]=useState({name:"",kcal:"",time:""});
  const [notes,setNotes]=useState("");
  const [water,setWater]=useState(0);

    if(wRef.current)clearInterval(wRef.current);
    wRef.current=setInterval(()=>fire("Drink Water 💧","Time for a glass of water!","water"),12*60*1000);
    return()=>clearInterval(wRef.current);
  },[notif]);

  function fire(label,msg,cat){
    setToast({label,msg,cat});
    setTimeout(()=>setToast(null),5000);
    if(soundOn)playSound(cat);
    if(notif&&"Notification"in window&&Notification.permission==="granted")
      new Notification(label,{body:msg,icon:"/icon-192.png",vibrate:[200,100,200]});
  }

  async function enableNotif(){
    if(!("Notification"in window)){fire("Not Supported","Use Chrome on Android for notifications.","sleep");return;}
    const p=await Notification.requestPermission();
    setNotif(p==="granted");
    if(p==="granted"){
      // Kick off SW water interval
      navigator.serviceWorker.ready.then(reg=>{
        if(reg.active) reg.active.postMessage({type:"WATER_INTERVAL"});
      });
      fire("Notifications Active 🔔","Background alerts enabled! Works even with screen off.","workout");
    } else {
      fire("Permission Denied","Go to Chrome Settings → Site Settings → Allow Notifications.","sleep");
    }
  }

  const cm=nowM();
  const srem=[...rems].sort((a,b)=>{let da=t2m(a.time)-cm,db=t2m(b.time)-cm;if(da<0)da+=1440;if(db<0)db+=1440;return da-db;});
  const nxt=srem.find(r=>r.on);
  const nxtD=nxt?(()=>{let d=t2m(nxt.time)-cm;if(d<0)d+=1440;return d;})():null;
  const totKcal=meals.reduce((s,m)=>s+(Number(m.kcal)||0),0);
  const todW=WP[todayDay()];
  const todWD=wo[todayDay()]||{};
  const gDone=goals.filter(g=>g.done).length;

  const NavItems=({mode})=>TABS.map(t=>{
    if(mode==="bottom") return(
      <button key={t.k} className={`bnav-btn${tab===t.k?" on":""}`} onClick={()=>setTab(t.k)}>
        <span className="bi">{t.i}</span><span>{t.l}</span>
      </button>
    );
    return(
      <button key={t.k} className={`snav${tab===t.k?" on":""}`} onClick={()=>setTab(t.k)}>
        <span style={{fontSize:14}}>{t.i}</span><span>{t.l}</span>
        {t.k==="goals"&&gDone>0&&<span style={{marginLeft:"auto",fontSize:10,fontFamily:"var(--fm)",color:"var(--green)"}}>{gDone}</span>}
      </button>
    );
  });

  return(
    <>
      <Styles/>
      <div style={{fontFamily:"var(--fb)",background:"var(--bg)",height:"100%",color:"var(--tx)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {toast&&(
          <div style={{position:"fixed",top:16,right:16,zIndex:9999,background:CAT[toast.cat]?.c||"var(--gold)",color:"#0c0a02",padding:"12px 16px",borderRadius:"12px",maxWidth:"270px",boxShadow:"0 10px 36px rgba(0,0,0,.55)",animation:"toastIn .25s ease",display:"flex",alignItems:"flex-start",gap:9}}>
            <span style={{fontSize:19,lineHeight:1,flexShrink:0}}>{CAT[toast.cat]?.i||"🔔"}</span>
            <div><div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{toast.label}</div><div style={{fontSize:12,opacity:.75}}>{toast.msg}</div></div>
          </div>
        )}

        {/* Top Bar */}
        <header style={{background:"var(--s1)",borderBottom:"1px solid var(--b1)",padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,flexShrink:0,position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,var(--gold),#b8821a)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--fd)",fontSize:14,color:"#0c0a02"}}>H</div>
            <div>
              <div style={{fontFamily:"var(--fd)",fontSize:13,color:"var(--tx)",lineHeight:1.1}}>Harsh Kapase</div>
              <div style={{fontSize:9,color:"var(--m1)",fontFamily:"var(--fm)",letterSpacing:".4px"}}>DAILY COMMAND CENTER</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {[["🔥",`${streak.n}d`],["💧",`${water}/9`],["🎯",`${gDone}/${goals.length}`]].map(([ic,v])=>(

              ))}
            </div>
            <button onClick={()=>{setSoundOn(s=>!s);try{playSound(soundOn?"sleep":"water");}catch(e){}}} style={{background:"transparent",border:`1px solid ${soundOn?"var(--gold)":"var(--b2)"}`,borderRadius:7,padding:"4px 9px",color:soundOn?"var(--gold)":"var(--m1)",fontSize:13,cursor:"pointer",transition:"all .2s"}}>{soundOn?"🔊":"🔇"}</button>
            <button onClick={enableNotif} style={{background:"transparent",border:`1px solid ${notif?"var(--green)":"var(--b2)"}`,borderRadius:7,padding:"4px 9px",color:notif?"var(--green)":"var(--m1)",fontSize:11,cursor:"pointer",fontFamily:"var(--fb)",transition:"all .2s"}}>{notif?"🔔":"🔕"}</button>
          </div>
        </header>

        <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>
          {/* Desktop Sidebar */}
          <nav className="sidebar" style={{width:170,background:"var(--s1)",borderRight:"1px solid var(--b1)",padding:"12px 8px",flexDirection:"column",gap:2,flexShrink:0,overflowY:"auto"}}>
            {nxt&&(
              <div style={{background:"var(--s2)",border:"1px solid var(--b1)",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
                <div style={{fontSize:10,color:"var(--m1)",letterSpacing:".5px",textTransform:"uppercase",marginBottom:4,fontFamily:"var(--fm)"}}>Next up</div>
                <div style={{fontSize:12,color:"var(--m3)",fontWeight:500,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nxt.label}</div>
                <div style={{fontFamily:"var(--fm)",fontSize:20,color:"var(--gold)",fontWeight:500,lineHeight:1}}>{fmtD(nxtD)}</div>
                <div style={{fontSize:10,color:"var(--m1)",fontFamily:"var(--fm)",marginTop:3}}>{nxt.time}</div>
              </div>
            )}
            <NavItems mode="sidebar"/>
          </nav>

          {/* Main */}
          <main className="main-pad" style={{flex:1,overflowY:"auto",padding:"20px 18px 50px",minWidth:0}}>
            <div style={{maxWidth:640}}>

              {/* REMINDERS */}

                <div>

                    const c=CAT[r.cat];
                    return(

                        <button onClick={()=>{if(soundOn)playSound(r.cat);}} style={{width:36,height:36,borderRadius:9,background:c.c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:"none",cursor:"pointer"}}>{c.i}</button>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:500,color:"var(--tx)",marginBottom:1}}>{r.label}</div>
                          <div style={{fontSize:11,color:"var(--m1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.msg}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0,marginRight:6}}>
                          <div style={{fontFamily:"var(--fm)",fontSize:12,color:r.on?c.c:"var(--m1)"}}>{r.on?fmtD(d):"—"}</div>
                          <div style={{fontSize:10,color:"var(--m1)",fontFamily:"var(--fm)"}}>{r.time}</div>
                        </div>
                        <Tog on={r.on} color={c.c} toggle={()=>setRems(p=>p.map(x=>x.id===r.id?{...x,on:!x.on}:x))}/>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TIMETABLE */}
              {tab==="timetable"&&(
                <div>
                  <SH title="Weekly Timetable" sub="Your subject schedule. Tap Edit on any day."/>
                  {DAYS.map((day,i)=>{
                    const isT=day===todayDay();
                    return(
                      <div key={day} className={`card fu${Math.min(i+1,5)}`} style={{borderColor:isT?"var(--gold)40":"var(--b1)"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:(tt[day].length>0||ttd===day)?9:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:9}}>
                            <span style={{fontFamily:"var(--fm)",fontSize:13,color:isT?"var(--gold)":"var(--m2)",fontWeight:500,minWidth:28}}>{day}</span>
                            {isT&&<span className="pill" style={{color:"var(--gold)",borderColor:"var(--gold)40",background:"var(--gold)10",fontSize:10}}>Today</span>}
                            {tt[day].length===0&&!isT&&<span style={{fontSize:12,color:"var(--m1)"}}>Rest day 🌴</span>}
                          </div>
                          <button className="btn btn-ghost" style={{padding:"4px 11px",fontSize:11}} onClick={()=>setTtd(ttd===day?null:day)}>{ttd===day?"Done":"Edit"}</button>
                        </div>
                        {tt[day].length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:ttd===day?9:0}}>{tt[day].map(s=><span key={s} className="pill" style={{color:SC[s],borderColor:SC[s]+"40",background:SC[s]+"10",fontSize:11}}>{s}</span>)}</div>}
                        {ttd===day&&(
                          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingTop:9,borderTop:"1px solid var(--b1)"}}>
                            {SUBJECTS.map(s=>{const on=tt[day].includes(s);return(<button key={s} onClick={()=>setTt(p=>({...p,[day]:on?p[day].filter(x=>x!==s):[...p[day],s]}))} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${on?SC[s]+"55":"var(--b2)"}`,background:on?SC[s]+"15":"var(--s3)",color:on?SC[s]:"var(--m2)",cursor:"pointer",fontSize:12,fontFamily:"var(--fb)",transition:"all .15s"}}>{on?"✓ ":""}{s}</button>);})}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* GOALS */}
              {tab==="goals"&&(
                <div>
                  <SH title="Study Goals" sub="Set daily targets and track your streak."/>
                  <div className="card fu" style={{background:"linear-gradient(135deg,#16100300,#2a1c04)",borderColor:"var(--gold)30",marginBottom:12,display:"flex",alignItems:"center",gap:14}}>
                    <div style={{fontSize:36,lineHeight:1}}>🔥</div>
                    <div><div style={{fontFamily:"var(--fm)",fontSize:32,color:"var(--gold)",fontWeight:500,lineHeight:1}}>{streak.n}</div><div style={{fontSize:12,color:"var(--gold3)",marginTop:2}}>day streak</div></div>
                    <div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontFamily:"var(--fm)",fontSize:20,color:"var(--green)"}}>{gDone}/{goals.length}</div><div style={{fontSize:11,color:"var(--m1)"}}>done today</div></div>
                  </div>
                  <div className="prog" style={{height:5,marginBottom:16}}><div className="prog-f" style={{width:`${(gDone/goals.length)*100}%`,background:"linear-gradient(90deg,var(--blue),var(--green))"}}/></div>
                  {goals.map((g,i)=>(
                    <div key={g.id} className={`card fu${Math.min(i+1,5)}`} style={{borderColor:g.done?"var(--green)28":"var(--b1)",opacity:g.done?.65:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <button className="check" onClick={()=>{setGoals(p=>p.map(x=>x.id===g.id?{...x,done:!x.done}:x));if(!g.done&&soundOn)playSound("study");}} style={{background:g.done?"var(--green)":"transparent",border:`2px solid ${g.done?"var(--green)":"var(--b2)"}`,color:"#051a10"}}>{g.done?"✓":""}</button>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:500,color:g.done?"var(--m1)":"var(--tx)",textDecoration:g.done?"line-through":"none",display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,borderRadius:"50%",background:SC[g.s],flexShrink:0,display:"inline-block"}}/>{g.s}</div>
                          {g.topic&&<div style={{fontSize:11,color:"var(--m1)",marginTop:2}}>📌 {g.topic}</div>}
                          {g.target&&<div style={{fontSize:11,color:"var(--blue)",marginTop:1}}>🎯 {g.target}</div>}
                        </div>
                        <button className="btn btn-ghost" style={{padding:"4px 11px",fontSize:11,flexShrink:0}} onClick={()=>setEg(eg===g.id?null:g.id)}>{eg===g.id?"Done":"Edit"}</button>
                      </div>
                      {eg===g.id&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--b1)",display:"flex",flexDirection:"column",gap:7}}><input value={g.topic} onChange={e=>setGoals(p=>p.map(x=>x.id===g.id?{...x,topic:e.target.value}:x))} placeholder="Today's topic…"/><input value={g.target} onChange={e=>setGoals(p=>p.map(x=>x.id===g.id?{...x,target:e.target.value}:x))} placeholder="Target (e.g. 2 chapters, 10 questions)…"/></div>}
                    </div>
                  ))}
                </div>
              )}

              {/* MEALS */}
              {tab==="meals"&&(
                <div>
                  <SH title="Calorie Log" sub="Target: ~3,200 kcal/day."/>
                  <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                    {[["🔥",totKcal,"kcal today",totKcal>=3000?"var(--green)":"var(--gold)"],["🎯","3,200","target","var(--m2)"],["📈",`${Math.min(Math.round((totKcal/3200)*100),100)}%`,"of goal","var(--blue)"]].map(([ic,v,l,c])=>(
                      <div key={l} className="card fu" style={{flex:1,minWidth:90,padding:"12px 14px",marginBottom:0}}><div style={{fontSize:15,marginBottom:4}}>{ic}</div><div style={{fontFamily:"var(--fm)",fontSize:18,color:c,fontWeight:500}}>{v}</div><div style={{fontSize:11,color:"var(--m1)",marginTop:1}}>{l}</div></div>
                    ))}
                  </div>
                  <div className="prog" style={{height:6,marginBottom:16}}><div className="prog-f" style={{width:`${Math.min((totKcal/3200)*100,100)}%`,background:"linear-gradient(90deg,var(--gold),var(--green))"}}/></div>
                  <div className="card fu" style={{borderColor:"var(--green)25"}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--green)",marginBottom:10}}>+ Log a Meal</div>
                    <div style={{display:"flex",flexDirection:"column",gap:7}}>
                      <select value={mi.name} onChange={e=>setMi(p=>({...p,name:e.target.value}))}><option value="">Select food item…</option>{MEAL_OPT.map(o=><option key={o}>{o}</option>)}</select>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}><input value={mi.kcal} onChange={e=>setMi(p=>({...p,kcal:e.target.value}))} placeholder="Calories" type="number"/><input value={mi.time} onChange={e=>setMi(p=>({...p,time:e.target.value}))} placeholder="Time"/></div>
                      <button className="btn btn-green" onClick={()=>{if(!mi.name)return;setMeals(p=>[...p,{...mi,id:Date.now()}]);setMi({name:"",kcal:"",time:""});if(soundOn)playSound("food");}}>Add Entry</button>
                    </div>
                  </div>
                  {meals.length===0?<div style={{textAlign:"center",color:"var(--m1)",fontSize:13,padding:"24px 0"}}>No meals logged yet.</div>:meals.map((m,i)=>(
                    <div key={m.id} className={`card fu${Math.min(i+1,5)}`} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:13,fontWeight:500}}>{m.name}</div>{m.time&&<div style={{fontSize:11,color:"var(--m1)",fontFamily:"var(--fm)",marginTop:1}}>{m.time}</div>}</div>
                      <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontFamily:"var(--fm)",fontSize:13,color:"var(--gold)"}}>{m.kcal} kcal</span><button onClick={()=>setMeals(p=>p.filter(x=>x.id!==m.id))} style={{background:"var(--s3)",border:"1px solid var(--b2)",color:"var(--m1)",width:24,height:24,borderRadius:5,cursor:"pointer",fontSize:13}}>×</button></div>
                    </div>
                  ))}
                </div>
              )}

              {/* WATER */}
              {tab==="water"&&(
                <div>
                  <SH title="Water Tracker" sub="9 glasses (≈2.25 L) daily. Auto-alert every 12 min."/>
                  <div className="card fu" style={{textAlign:"center",padding:"24px 16px",marginBottom:14,background:"linear-gradient(135deg,#061414,#0b2020)",borderColor:"var(--teal)30"}}>
                    <div style={{fontSize:44,marginBottom:5}}>{water>=9?"🌊":"💧"}</div>
                    <div style={{fontFamily:"var(--fm)",fontSize:52,fontWeight:500,color:"var(--teal)",lineHeight:1}}>{water}</div>
                    <div style={{fontSize:13,color:"var(--m2)",margin:"5px 0 2px"}}>of 9 glasses today</div>
                    <div style={{fontSize:12,color:water>=9?"var(--green)":"var(--gold)",marginBottom:12}}>{water>=9?"✅ Goal reached!":`${9-water} to go`}</div>
                    <div className="prog" style={{height:7,marginBottom:14}}><div className="prog-f" style={{width:`${Math.min((water/9)*100,100)}%`,background:"linear-gradient(90deg,var(--teal),#0ea5e9)"}}/></div>
                    <div style={{display:"flex",justifyContent:"center",gap:12}}>
                      <button onClick={()=>setWater(w=>Math.max(0,w-1))} style={{width:44,height:44,borderRadius:"50%",fontSize:22,background:"var(--s3)",border:"1px solid var(--b2)",cursor:"pointer",color:"var(--tx)"}}>−</button>
                      <button onClick={()=>{setWater(w=>Math.min(15,w+1));if(soundOn)playSound("water");}} style={{width:44,height:44,borderRadius:"50%",fontSize:22,background:"var(--teal)",border:"none",cursor:"pointer",color:"#041414",fontWeight:700}}>+</button>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
                    {Array.from({length:9}).map((_,i)=>(
                      <button key={i} onClick={()=>{setWater(i<water?i:i+1);if(i>=water&&soundOn)playSound("water");}} style={{background:i<water?"#051a1a":"var(--s1)",border:`1px solid ${i<water?"var(--teal)":"var(--b1)"}`,borderRadius:9,padding:"11px 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all .15s"}}>
                        <span style={{fontSize:19}}>{i<water?"🥛":"🫙"}</span>
                        <span style={{fontSize:10,color:i<water?"var(--teal)":"var(--m1)",fontFamily:"var(--fm)"}}>#{i+1}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* WORKOUT */}
              {tab==="workout"&&(
                <div>
                  <SH title="Workout Tracker" sub={`${todayDay()} — mark each set as complete.`}/>
                  <div className="card fu" style={{background:"linear-gradient(135deg,#0a0f2a,#141c50)",borderColor:"var(--blue)30",marginBottom:14}}>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.3)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:3,fontFamily:"var(--fm)"}}>{todayDay()}'s Focus</div>
                    <div style={{fontFamily:"var(--fd)",fontSize:20,color:"var(--tx)"}}>{todW?.f}</div>

                  </div>
                  {todW?.e.map((ex,i)=>{
                    const done=todWD[i]||[];const total=ex.s>0?ex.s:1;const pct=Math.round((done.length/total)*100);

                      <div key={i} className={`card fu${Math.min(i+1,5)}`}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:ex.s>0?9:0}}>
                          <div><div style={{fontSize:13,fontWeight:500,color:"var(--tx)"}}>{ex.n}</div><div style={{fontSize:11,color:"var(--m1)",fontFamily:"var(--fm)",marginTop:1}}>{ex.s>0?`${ex.s} × ${ex.r}`:ex.r}</div></div>
                          {ex.s>0&&<span style={{fontSize:11,color:pct===100?"var(--green)":"var(--m1)",fontFamily:"var(--fm)",background:"var(--s3)",padding:"3px 8px",borderRadius:5}}>{done.length}/{total}</span>}
                        </div>
                        {ex.s>0&&(<><div className="prog" style={{height:3,marginBottom:8}}><div className="prog-f" style={{width:`${pct}%`,background:pct===100?"var(--green)":"var(--blue)"}}/></div>
                          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                            {Array.from({length:ex.s}).map((_,si)=>(
                              <button key={si} className={`set-chip${done.includes(si)?" on":""}`} onClick={()=>{const c=[...(todWD[i]||[])];if(c.includes(si))c.splice(c.indexOf(si),1);else{c.push(si);if(soundOn)playSound("workout");}setWo(p=>({...p,[todayDay()]:{...p[todayDay()]||{},[i]:c}}));}}>Set {si+1}{done.includes(si)?" ✓":""}</button>
                            ))}
                          </div></>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* SLEEP */}
              {tab==="sleep"&&(
                <div>
                  <SH title="Sleep Log" sub="Target: 7 hrs minimum."/>
                  <div className="card fu" style={{background:"linear-gradient(135deg,#0a0814,#130e24)",borderColor:"var(--purple)30",marginBottom:14}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--purple)",marginBottom:12}}>🌙 Log tonight's sleep</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
                      <div><label style={{fontSize:11,color:"var(--m1)",display:"block",marginBottom:4,fontFamily:"var(--fm)"}}>Bedtime</label><input type="time" value={sleep.bed} onChange={e=>setSleep(p=>({...p,bed:e.target.value}))}/></div>
                      <div><label style={{fontSize:11,color:"var(--m1)",display:"block",marginBottom:4,fontFamily:"var(--fm)"}}>Wake up</label><input type="time" value={sleep.wake} onChange={e=>setSleep(p=>({...p,wake:e.target.value}))}/></div>
                    </div>
                    <div style={{marginBottom:9}}>
                      <label style={{fontSize:11,color:"var(--m1)",display:"block",marginBottom:5,fontFamily:"var(--fm)"}}>Quality — <span style={{color:"var(--tx)"}}>{["Very Poor","Poor","Okay","Good","Excellent"][sleep.q-1]}</span></label>
                      <div style={{display:"flex",gap:9,marginBottom:1}}>{["😫","😴","😐","🙂","😊"].map((em,i)=><button key={i} className="q-em" onClick={()=>setSleep(p=>({...p,q:i+1}))} style={{opacity:sleep.q===i+1?1:.3}}>{em}</button>)}</div>
                    </div>
                    <input value={sleep.note} onChange={e=>setSleep(p=>({...p,note:e.target.value}))} placeholder="Notes…" style={{marginBottom:10}}/>
                    <button className="btn btn-gold" onClick={()=>{
                      if(!sleep.bed||!sleep.wake)return;
                      const[bh,bm]=sleep.bed.split(":").map(Number),[wh,wm]=sleep.wake.split(":").map(Number);
                      const dur=((wh*60+wm)-(bh*60+bm)+1440)%1440;
                      const entry={...sleep,date:todayKey(),dur:`${Math.floor(dur/60)}h ${dur%60}m`,id:Date.now()};
                      setSlog(p=>[entry,...p.slice(0,13)]);setSleep({bed:"",wake:"",q:3,note:""});
                      if(soundOn)playSound("sleep");fire("Sleep Logged",`${entry.dur} recorded.`,"sleep");
                    }}>Save Entry</button>
                  </div>
                  {slog.length===0?<div style={{textAlign:"center",color:"var(--m1)",fontSize:13,padding:"22px 0"}}>No sleep entries yet.</div>:slog.map((s,i)=>(
                    <div key={s.id} className={`card fu${Math.min(i+1,5)}`} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:13,fontWeight:500}}>{s.date}</div><div style={{fontSize:11,color:"var(--m1)",fontFamily:"var(--fm)",marginTop:1}}>{s.bed} → {s.wake}</div>{s.note&&<div style={{fontSize:11,color:"var(--m1)",marginTop:1}}>{s.note}</div>}</div>
                      <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}><span style={{fontFamily:"var(--fm)",fontSize:16,color:"var(--purple)"}}>{s.dur}</span><span style={{fontSize:17}}>{["😫","😴","😐","🙂","😊"][s.q-1]}</span></div>
                    </div>
                  ))}
                </div>
              )}

              {/* NOTES */}
              {tab==="notes"&&(
                <div>
                  <SH title="Quick Notes" sub="Auto-saved. Jot down doubts, ideas, to-dos."/>
                  <div style={{position:"relative"}}>
                    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder={"Notes, ideas, reminders…\n\n— Ask sir about recursion\n— Revise DBMS joins\n— Buy sattu"} style={{width:"100%",minHeight:360,resize:"vertical",lineHeight:1.85,padding:"14px",borderRadius:"12px",fontSize:13,fontFamily:"var(--fb)"}}/>
                    <div style={{position:"absolute",bottom:12,right:12,fontSize:10,color:"var(--m1)",fontFamily:"var(--fm)",pointerEvents:"none",background:"var(--s3)",padding:"2px 7px",borderRadius:4}}>{notes.length} chars</div>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>

        {/* Mobile Bottom Nav */}
        <nav className="bnav-bar"><NavItems mode="bottom"/></nav>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
